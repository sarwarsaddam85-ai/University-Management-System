{% extends "base.html" %}

{% block title %}Login - SMS{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h2 class="card-title text-center mb-0">Login</h2>
            </div>
            <div class="card-body">
                <form id="loginForm">

                    <div class="mb-3">
                        <label for="emailInput" class="form-label">Email Address</label>
                        <input type="email" class="form-control" name="email" id="emailInput" required>
                    </div>

                    <div class="mb-3">
                        <label for="passwordInput" class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" id="passwordInput" required>
                    </div>

                    <div id="errorMessage" class="alert alert-danger d-none mt-3" role="alert"></div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Login</button>
                    </div>

                </form>
            </div>
            <div class="card-footer text-center">
                <p class="mb-0">Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
    // ## IMPORTANT: PASTE YOUR ACTUAL FIREBASE CONFIGURATION HERE ##
    const firebaseConfig = {
        apiKey: "AIzaSyBgLqbcLigFjE12r8iRwTeeVaiuqzm0B8A",
        authDomain: "studentmanagementsystem-204e6.firebaseapp.com",
        projectId: "studentmanagementsystem-204e6",
        storageBucket: "studentmanagementsystem-204e6.firebasestorage.app",
        messagingSenderId: "815669318325",
        appId: "1:815669318325:web:24f3625ca903831fbf64fc"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); // Get the auth service

    // ## Handle Form Submission ##
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const errorMessageDiv = document.getElementById('errorMessage');

    loginForm.addEventListener('submit', (e) => {
        e.preventDefault(); // Stop the default browser form submission

        const email = emailInput.value;
        const password = passwordInput.value;
        errorMessageDiv.classList.add('d-none'); // Hide previous errors

        // Sign in using Firebase Authentication (client-side)
        auth.signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                // Sign-in successful. Get the user's ID token.
                console.log("Firebase sign-in successful"); // Debug log
                const user = userCredential.user;
                return user.getIdToken(); // Get the token to send to backend
            })
            .then((idToken) => {
                // Send the ID token to your Flask backend for verification
                console.log("Got ID Token, sending to backend..."); // Debug log
                fetch("{{ url_for('auth.login') }}", { // POST to your Flask login route
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json', // Set correct header
                    },
                    body: JSON.stringify({ idToken: idToken }), // Send token in JSON format
                })
                .then(response => {
                    console.log("Received response from backend status:", response.status); // Debug log
                    if (!response.ok) { // Check for HTTP errors (like 4xx, 5xx)
                         return response.json().then(errData => { throw new Error(errData.message || `Server error: ${response.status}`) });
                    }
                    return response.json(); // Parse JSON response from Flask
                })
                .then(data => {
                    console.log("Backend response data:", data); // Debug log
                    if (data.success) {
                        // Redirect successful login based on backend response
                        window.location.href = data.redirectUrl;
                    } else {
                        // Show error message from Flask backend
                        showError(data.message || 'Login failed on server.');
                    }
                })
                .catch((error) => {
                    // Handle errors during fetch/backend communication
                    console.error('Error sending token to backend:', error);
                    showError(error.message || 'Failed to communicate with server.');
                });
            })
            .catch((error) => {
                // Handle Firebase Authentication errors (wrong password, user not found, etc.)
                console.error("Firebase Login Error:", error.code, error.message); // Log specific Firebase error
                // Provide user-friendly messages for common errors
                let friendlyMessage = error.message;
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    friendlyMessage = "Invalid email or password.";
                } else if (error.code === 'auth/invalid-email') {
                    friendlyMessage = "Please enter a valid email address.";
                }
                showError(friendlyMessage); // Show Firebase error message to user
            });
    });

    // Helper function to display errors on the page
    function showError(message) {
        errorMessageDiv.textContent = message;
        errorMessageDiv.classList.remove('d-none'); // Make the error div visible
    }
</script>
{% endblock %}
